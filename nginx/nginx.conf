upstream backend       { server backend:8000; }
upstream frontend      { server frontend:80;  }
upstream neo4j_browser { server neo4j:7474;   }

server {
    listen 80;
    server_name _;

    # ── API traffic → FastAPI backend ─────────────────────────────────────
    location /api/ {
        proxy_pass         http://backend;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        # LLM pipeline (verify-and-converge loop) can take several minutes
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # ── Neo4j Browser (admin only — restrict with allow/deny in production) ─
    location /browser/ {
        proxy_pass       http://neo4j_browser/browser/;
        proxy_set_header Host $host;
    }

    # ── Neo4j Bolt WebSocket passthrough ──────────────────────────────────
    location /bolt {
        proxy_pass         http://neo4j:7687;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
    }

    # ── Everything else → React frontend ──────────────────────────────────
    location / {
        proxy_pass       http://frontend;
        proxy_set_header Host $host;
    }
}
